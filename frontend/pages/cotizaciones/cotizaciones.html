<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ServiGest — Cotizaciones</title>
  <link rel="stylesheet" href="../../css/base.css" />
</head>
<body>

<div class="layout">
    <aside class="sidebar">
    <div class="logo"><div class="logo-dot"></div>ServiGest</div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-user">
      <div class="user-avatar">--</div>
      <div><div class="user-name">Cargando...</div><div class="user-empresa"></div></div>
    </div>
    <button id="btn-logout" class="btn btn-ghost btn-sm" style="margin-top:8px">Cerrar sesión</button>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Cotizaciones</h1>
        <p class="page-subtitle">Presupuestos enviados a clientes</p>
      </div>
      <button class="btn btn-primary" id="btn-nueva">+ Nueva cotización</button>
    </div>

    <div class="card" style="padding:0">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Cliente</th><th>Items</th><th>Total</th><th>Fecha</th><th>Estado</th><th></th></tr>
          </thead>
          <tbody id="tabla-cotizaciones">
            <tr><td colspan="6" style="text-align:center;color:var(--color-text-muted);padding:2rem">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Modal cotización -->
<div class="modal-overlay" id="modal-cotizacion">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <span class="modal-title">Nueva cotización</span>
      <button class="btn btn-ghost btn-icon" onclick="closeModal('modal-cotizacion')">✕</button>
    </div>

    <div style="display:flex;flex-direction:column;gap:1rem">
      <div class="form-group">
        <label class="form-label">Cliente *</label>
        <select class="form-select" id="cot-cliente"></select>
      </div>

      <div>
        <div class="flex-between" style="margin-bottom:8px">
          <span style="font-size:13px;font-weight:500;color:var(--color-text-muted)">Conceptos</span>
          <button class="btn btn-secondary btn-sm" id="btn-add-item">+ Agregar línea</button>
        </div>
        <div id="items-container" style="display:flex;flex-direction:column;gap:8px"></div>
      </div>

      <div style="text-align:right;font-size:15px;font-weight:600;padding-top:8px;border-top:1px solid var(--color-border)">
        Total: <span id="cot-total">$0</span>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-cotizacion')">Cancelar</button>
      <button class="btn btn-primary" id="btn-guardar-cot">Guardar cotización</button>
    </div>
  </div>
</div>

<script src="../../js/config.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/sidebar.js"></script>
<script>
  requireAuth();
  initSidebar('cotizaciones');

  async function loadCotizaciones() {
    const tbody = document.getElementById('tabla-cotizaciones');
    try {
      const cots = await api.cotizaciones.list();
      if (cots.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--color-text-muted);padding:2rem">Sin cotizaciones aún</td></tr>`;
        return;
      }
      tbody.innerHTML = cots.map(c => `
        <tr>
          <td style="font-size:13px;font-weight:500">${c.cliente_nombre}</td>
          <td style="font-size:12px;color:var(--color-text-muted)">${c.items ? c.items.length : 0} concepto(s)</td>
          <td style="font-weight:500">${formatMoney(c.total)}</td>
          <td style="font-size:12px;color:var(--color-text-muted)">${formatDate(c.created_at)}</td>
          <td>${estadoBadge(c.estado)}</td>
          <td>
            <select class="form-select" style="font-size:12px;padding:4px 8px;min-height:32px;width:110px"
              onchange="cambiarEstado('${c.id}', this.value)">
              <option value="borrador"  ${c.estado==='borrador'  ?'selected':''}>Borrador</option>
              <option value="enviada"   ${c.estado==='enviada'   ?'selected':''}>Enviada</option>
              <option value="aceptada"  ${c.estado==='aceptada'  ?'selected':''}>Aceptada</option>
              <option value="rechazada" ${c.estado==='rechazada' ?'selected':''}>Rechazada</option>
            </select>
          </td>
        </tr>
      `).join('');
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  async function cambiarEstado(id, estado) {
    try {
      await api.cotizaciones.updateEstado(id, estado);
      showToast('Estado actualizado');
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  // ── Modal nueva cotización ────────────────────────────────────────────────
  let itemCount = 0;

  document.getElementById('btn-nueva').addEventListener('click', async () => {
    const clientes = await api.clientes.list();
    const sel = document.getElementById('cot-cliente');
    sel.innerHTML = clientes.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
    document.getElementById('items-container').innerHTML = '';
    itemCount = 0;
    agregarItem();
    actualizarTotal();
    openModal('modal-cotizacion');
  });

  document.getElementById('btn-add-item').addEventListener('click', agregarItem);

  function agregarItem() {
    const i = itemCount++;
    const div = document.createElement('div');
    div.className = 'grid-2';
    div.style.gap = '8px';
    div.innerHTML = `
      <div class="form-group" style="grid-column:1/-1">
        <input class="form-input item-desc" placeholder="Descripción del servicio" style="font-size:13px" />
      </div>
      <div class="form-group">
        <input class="form-input item-qty" type="number" placeholder="Cantidad" min="1" value="1" style="font-size:13px" />
      </div>
      <div class="form-group">
        <input class="form-input item-price" type="number" placeholder="Precio unitario" min="0" style="font-size:13px" />
      </div>
    `;
    div.querySelectorAll('input').forEach(inp => inp.addEventListener('input', actualizarTotal));
    document.getElementById('items-container').appendChild(div);
  }

  function actualizarTotal() {
    let total = 0;
    document.querySelectorAll('#items-container > div').forEach(div => {
      const qty   = parseFloat(div.querySelector('.item-qty')?.value) || 0;
      const price = parseFloat(div.querySelector('.item-price')?.value) || 0;
      total += qty * price;
    });
    document.getElementById('cot-total').textContent = formatMoney(total);
  }

  document.getElementById('btn-guardar-cot').addEventListener('click', async () => {
    const cliente_id = document.getElementById('cot-cliente').value;
    const items = [];

    document.querySelectorAll('#items-container > div').forEach(div => {
      const descripcion      = div.querySelector('.item-desc')?.value;
      const cantidad         = parseFloat(div.querySelector('.item-qty')?.value) || 0;
      const precio_unitario  = parseFloat(div.querySelector('.item-price')?.value) || 0;
      if (descripcion && cantidad && precio_unitario) {
        items.push({ descripcion, cantidad, precio_unitario });
      }
    });

    if (!items.length) return showToast('Agrega al menos un concepto', 'error');

    try {
      await api.cotizaciones.create({ cliente_id, items });
      showToast('Cotización creada');
      closeModal('modal-cotizacion');
      loadCotizaciones();
    } catch (err) {
      showToast(err.message, 'error');
    }
  });

  loadCotizaciones();
</script>
</body>
</html>
