<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ServiGest — Iniciar sesión</title>
  <link rel="stylesheet" href="../../css/base.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--color-bg-secondary); }
    .login-card { width: 100%; max-width: 380px; background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 2rem; }
    .login-logo { display: flex; align-items: center; gap: 8px; font-size: 20px; font-weight: 600; margin-bottom: 2rem; }
    .login-logo .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--color-accent); }
    .login-title { font-size: 16px; font-weight: 600; margin-bottom: 1.5rem; }
    .form-stack { display: flex; flex-direction: column; gap: 1rem; }
    .toggle-form { text-align: center; margin-top: 1rem; font-size: 13px; color: var(--color-text-muted); }
    .toggle-form a { color: var(--color-accent); cursor: pointer; font-weight: 500; }
    .error-msg { font-size: 13px; color: var(--color-text-hint); background: var(--estado-cancelado-bg); color: var(--estado-cancelado-text); padding: 10px 12px; border-radius: var(--radius-md); display: none; }
    .btn-block { width: 100%; justify-content: center; }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <div class="logo-dot"></div>
    ServiGest
  </div>

  <!-- Formulario login -->
  <div id="form-login">
    <p class="login-title">Iniciar sesión</p>
    <div class="form-stack">
      <div id="login-error" class="error-msg"></div>
      <div class="form-group">
        <label class="form-label" for="login-email">Correo electrónico</label>
        <input class="form-input" type="email" id="login-email" placeholder="tu@correo.com" />
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password">Contraseña</label>
        <input class="form-input" type="password" id="login-password" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary btn-block" id="btn-login">Entrar</button>
    </div>
    <div class="toggle-form">¿No tienes cuenta? <a onclick="toggleForm()">Regístrate</a></div>
  </div>

  <!-- Formulario registro -->
  <div id="form-register" style="display:none">
    <p class="login-title">Crear cuenta</p>
    <div class="form-stack">
      <div id="register-error" class="error-msg"></div>
      <div class="form-group">
        <label class="form-label" for="reg-nombre">Tu nombre</label>
        <input class="form-input" type="text" id="reg-nombre" placeholder="Juan Martínez" />
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-empresa">Nombre de tu empresa</label>
        <input class="form-input" type="text" id="reg-empresa" placeholder="Servicios López" />
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-email">Correo electrónico</label>
        <input class="form-input" type="email" id="reg-email" placeholder="tu@correo.com" />
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-password">Contraseña</label>
        <input class="form-input" type="password" id="reg-password" placeholder="Mínimo 8 caracteres" />
      </div>
      <button class="btn btn-primary btn-block" id="btn-register">Crear cuenta</button>
    </div>
    <div class="toggle-form">¿Ya tienes cuenta? <a onclick="toggleForm()">Inicia sesión</a></div>
  </div>
</div>

<script src="../../js/config.js"></script>
<script src="../../js/api.js"></script>
<script>
  // Si ya está autenticado, ir al dashboard
  if (api.isAuthenticated()) {
    window.location.href = '../dashboard/dashboard.html';
  }

  function toggleForm() {
    const login    = document.getElementById('form-login');
    const register = document.getElementById('form-register');
    login.style.display    = login.style.display    === 'none' ? 'block' : 'none';
    register.style.display = register.style.display === 'none' ? 'block' : 'none';
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }

  // Login
  document.getElementById('btn-login').addEventListener('click', async () => {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    try {
      await api.login(email, password);
      window.location.href = '../dashboard/dashboard.html';
    } catch (err) {
      showError('login-error', err.message);
    }
  });

  // Registro
  document.getElementById('btn-register').addEventListener('click', async () => {
    const nombre   = document.getElementById('reg-nombre').value.trim();
    const empresa  = document.getElementById('reg-empresa').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;

    try {
      await api.register(nombre, email, password, empresa);
      window.location.href = '../dashboard/dashboard.html';
    } catch (err) {
      showError('register-error', err.message);
    }
  });

  // Enter en inputs
  document.querySelectorAll('.form-input').forEach(input => {
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const activeForm = document.getElementById('form-login').style.display !== 'none'
          ? 'btn-login' : 'btn-register';
        document.getElementById(activeForm).click();
      }
    });
  });
</script>
</body>
</html>
